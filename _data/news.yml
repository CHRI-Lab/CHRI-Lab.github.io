- date: Apr 11, 2026
  headline: "Muhammad Bilal submitted his Ph.D. thesis, marking a significant milestone in his academic journey. His thesis encompasses a comprehensive exploration of learning from demonstration (LfD) algorithms, the impact of robot redundancy on LfD, and the development of an XR system for human-robot collaboration. Congratulations to Muhammad on this remarkable achievement!"
  description: "Lab Life" 

