name: Generate Paper Page

on:
  workflow_dispatch:
    inputs:
      paper_source:
        description: 'arXiv ID (e.g. 2603.02050) or paper URL (ACM, IEEE, CHRI-Lab, etc.)'
        required: false
        type: string
      pdf_path:
        description: 'Path to PDF already in the repo (e.g. files/papers/mypaper.pdf)'
        required: false
        type: string
      bibtex:
        description: 'Paste your BibTeX entry here (optional but recommended)'
        required: false
        type: string
      code_url:
        description: 'Code repository URL'
        required: false
        type: string
      demo_url:
        description: 'Demo URL'
        required: false
        type: string
      dataset_url:
        description: 'Dataset URL'
        required: false
        type: string
      slides_url:
        description: 'Slides URL'
        required: false
        type: string
      video_url:
        description: 'Video URL (YouTube or Vimeo embed link)'
        required: false
        type: string
      teaser_path:
        description: 'Path to teaser image already in the repo (e.g. assets/papers/teaser.jpg)'
        required: false
        type: string
      notes:
        description: 'Extra notes for Claude (e.g. corrections, special instructions)'
        required: false
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install \
            anthropic \
            requests \
            beautifulsoup4 \
            pypdf \
            pymupdf \
            pyyaml \
            bibtexparser

      - name: Generate paper page
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          INPUT_PAPER_SOURCE: ${{ inputs.paper_source }}
          INPUT_PDF_PATH: ${{ inputs.pdf_path }}
          INPUT_BIBTEX: ${{ inputs.bibtex }}
          INPUT_CODE_URL: ${{ inputs.code_url }}
          INPUT_DEMO_URL: ${{ inputs.demo_url }}
          INPUT_DATASET_URL: ${{ inputs.dataset_url }}
          INPUT_SLIDES_URL: ${{ inputs.slides_url }}
          INPUT_VIDEO_URL: ${{ inputs.video_url }}
          INPUT_TEASER_PATH: ${{ inputs.teaser_path }}
          INPUT_NOTES: ${{ inputs.notes }}
        run: python scripts/generate_paper_page.py

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: paper-page/${{ env.PAPER_SLUG }}
          title: 'Add paper page: ${{ env.PAPER_TITLE }}'
          commit-message: 'Add paper page: ${{ env.PAPER_TITLE }}'
          body: |
            ## New paper page — review before merging

            ${{ env.PR_BODY }}

            ---
            *Generated by the [Paper Page Generator](/.github/workflows/paper-page.yml) action.*
          labels: paper-page
          delete-branch: true
