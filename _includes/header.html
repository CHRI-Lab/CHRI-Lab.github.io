<nav class="chri-nav" role="navigation" aria-label="Main navigation">
  <div class="chri-nav-inner">
    <a class="chri-nav-brand" href="{{ site.url }}{{ site.baseurl }}/">
      <img src="{{ site.url }}{{ site.baseurl }}/images/logopic/chri-logo.png" alt="CHRI Lab logo" onerror="this.style.display='none'">
      <span>CHRI Lab</span>
    </a>

    <button class="chri-nav-toggle" id="chri-nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>

    <ul class="chri-nav-links" id="chri-nav-links">
      <li><a href="{{ site.url }}{{ site.baseurl }}/"{% if page.url == '/' %} class="active"{% endif %}>Home</a></li>
      <li><a href="{{ site.url }}{{ site.baseurl }}/people"{% if page.url contains 'people' %} class="active"{% endif %}>Team</a></li>
      <li><a href="{{ site.url }}{{ site.baseurl }}/publications"{% if page.url contains 'publications' %} class="active"{% endif %}>Publications</a></li>
      <li><a href="mailto:wafa.johal@unimelb.edu.au">Contact</a></li>
    </ul>
  </div>
</nav>

<script>
(function(){
  var btn = document.getElementById('chri-nav-toggle');
  var links = document.getElementById('chri-nav-links');
  if (btn && links) {
    btn.addEventListener('click', function(){
      var open = links.classList.toggle('open');
      btn.setAttribute('aria-expanded', open);
    });
  }
})();
</script>
